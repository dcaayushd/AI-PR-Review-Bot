name: AI PR Review

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out trusted base repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install review bot
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Fetch PR head ref safely
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags --depth=1 origin pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}

      - name: Run AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          PYTHONUNBUFFERED: "1"
        run: |
          ai-pr-review \
            --repo-root "$GITHUB_WORKSPACE" \
            --head-ref "refs/remotes/origin/pr/${{ github.event.pull_request.number }}"

